# =====================================================
# .github/workflows/build.yml
#
# Receta que le dice a GitHub cómo compilar OG Control para
# Windows en la nube y entregarte el .exe ya hecho.
#
# Se ejecuta solo cada vez que subes cambios, o cuando le das
# al botón "Run workflow" a mano desde la pestaña Actions.
# =====================================================

name: Compilar OG Control (Windows)

# Cuándo se dispara la compilación.
on:
  push:
    branches: [ main, master ]   # al subir al repo
  workflow_dispatch:              # o a mano, con un botón en GitHub

jobs:
  build:
    # Usamos una máquina virtual de Windows que pone GitHub.
    runs-on: windows-latest

    steps:
      # 1. Baja tu código del repo a la máquina virtual.
      - name: Bajar el código
        uses: actions/checkout@v4

      # 2. Instala Node.js (para el CLI de Tauri).
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instala Rust (la cadena de herramientas estable).
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. Cachea las dependencias de Rust para que la próxima
      #    compilación sea mucho más rápida.
      - name: Cachear dependencias de Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 5. Instala las dependencias de npm (el CLI de Tauri).
      - name: Instalar dependencias npm
        run: npm install

      # 6. Compila la app y genera el instalador .exe.
      - name: Compilar el .exe
        run: npm run tauri build

      # 7. Sube el instalador para que lo puedas descargar.
      #    Queda como "artifact" en la página de la ejecución.
      - name: Publicar el instalador
        uses: actions/upload-artifact@v4
        with:
          name: OG-Control-instalador
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/og-control.exe
          if-no-files-found: warn
