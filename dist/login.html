<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Control · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-brand">
      <img src="assets/logo/logo.jpeg" alt="OG" class="login-logo">
      <div>
        <strong>OG CONTROL</strong>
        <small>Productos &amp; Punto de Venta</small>
      </div>
    </div>

    <h1 class="login-title">Inicia sesión</h1>
    <p class="login-sub">Accede para administrar el inventario y las ventas.</p>

    <div class="login-error" id="loginError" hidden></div>

    <form class="login-form" id="loginForm" autocomplete="off">
      <label>
        Usuario
        <input type="text" name="usuario" id="usuario" required autofocus placeholder="admin">
      </label>
      <label>
        Contraseña
        <input type="password" name="password" id="password" required placeholder="••••••••">
      </label>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <p class="login-foot">Demo · usuario <code>admin</code> / contraseña <code>ogadmin123</code></p>
  </div>

  <script>
    const TOKEN_KEY = "og_token";

    // Si ya hay sesión iniciada, no tiene sentido ver el login.
    if (localStorage.getItem(TOKEN_KEY)) {
      window.location.href = "index.html";
    }

    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("loginError");

    function mostrarError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.hidden = true;

      const usuario = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value;

      if (!usuario || !password) {
        mostrarError("Escribe tu usuario y contraseña.");
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, password }),
        });
        const data = await res.json();

        if (data.ok && data.token) {
          // Guardo el token; el panel lo enviará en cada petición.
          localStorage.setItem(TOKEN_KEY, data.token);
          window.location.href = "index.html";
        } else {
          mostrarError(data.error || "Usuario o contraseña incorrectos.");
        }
      } catch (err) {
        mostrarError("No se pudo contactar al servidor local.");
      }
    });
  </script>

</body>
</html>
